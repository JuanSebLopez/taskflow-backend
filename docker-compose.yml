services:
  backend:
    build: .
    container_name: taskflow-backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/taskflow
      JWT_SECRET: taskflow_docker_secret
      NODE_ENV: production
      SEED_DATA: "true"
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: taskflow-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
